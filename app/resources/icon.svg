<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13162b"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#bg)"/>

  <!-- Blue arc: upper-right semicircle -->
  <path d="M 256 96 A 160 160 0 0 1 416 256" fill="none" stroke="#5b8ad6" stroke-width="24" stroke-linecap="round"/>
  <polygon points="424,232 416,274 390,246" fill="#5b8ad6"/>

  <!-- Amber arc: lower-left semicircle -->
  <path d="M 256 416 A 160 160 0 0 1 96 256" fill="none" stroke="#e8a838" stroke-width="24" stroke-linecap="round"/>
  <polygon points="88,280 96,238 122,266" fill="#e8a838"/>

  <!-- Center ring: half blue, half amber -->
  <path d="M 256 226 A 30 30 0 0 1 256 286" fill="none" stroke="#5b8ad6" stroke-width="4" opacity="0.5"/>
  <path d="M 256 286 A 30 30 0 0 1 256 226" fill="none" stroke="#e8a838" stroke-width="4" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#5b8ad6" opacity="0.9"/>
</svg>
